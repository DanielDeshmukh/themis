# LoRA fine-tuning configuration for THEMIS v2

base_model: unsloth/mistral-7b-instruct-v0.3-bnb-4bit
method: lora

lora:
  r: 16                          # LoRA rank
  lora_alpha: 32                 # Scaling factor
  target_modules:                # All attention layers
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM

training:
  epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  warmup_ratio: 0.03
  lr_scheduler: cosine
  max_seq_length: 1024
  fp16: true                     # T4 compatible

unsloth:
  use_gradient_checkpointing: true
  random_state: 42

output:
  adapter_dir: ./model/themis-lora
  hub_repo: Daniel2503/themis-mistral-7b-lora
